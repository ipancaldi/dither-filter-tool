<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-labelledby="title desc">
  <title id="title">Pancaldi Academy logo</title>
  <desc id="desc">A compact PA monogram and Pancaldi Academy wordmark.</desc>
  <rect width="360" height="96" fill="#F5F1E8"/>
  <g transform="translate(8 10)">
    <rect x="0" y="0" width="76" height="76" fill="#111111"/>
    <rect x="8" y="8" width="12" height="60" fill="#E24B2C"/>
    <rect x="24" y="8" width="12" height="60" fill="#F5F1E8"/>
    <rect x="40" y="8" width="12" height="60" fill="#2D4C73"/>
    <text x="90" y="54" font-family="Iowan Old Style, Charter, Georgia, serif" font-size="52" font-weight="600" letter-spacing="0" fill="#111111">PA</text>
  </g>
  <g transform="translate(190 24)" fill="#111111">
    <text x="0" y="18" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0">Pancaldi</text>
    <text x="0" y="46" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0">Academy</text>
    <rect x="0" y="57" width="92" height="2" fill="#111111"/>
    <rect x="102" y="57" width="16" height="2" fill="#E24B2C"/>
  </g>
</svg>
